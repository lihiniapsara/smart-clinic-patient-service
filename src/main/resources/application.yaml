spring:
  application:
    name: patient-service

  config:
    import: "optional:configserver:"

  cloud:
    config:
        uri: ${CONFIG_SERVER_URIS:http://config.platform:9000}

server:
  port: 8082   # <-- මෙතන port එක assign කරලා තියෙන්න

eureka:
  instance:
    hostname: ${HOSTNAME}
    instance-id: ${spring.application.name}:${HOSTNAME}:${server.port}
    prefer-ip-address: false
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: ${EUREKA_SERVER_URLS:http://vm-node-a.platform:9001/eureka/,http://vm-node-b.platform:9001/eureka/,http://vm-node-c.platform:9001/eureka/}